name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

permissions:
  contents: read

jobs:
  platform:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.9-alpine
        env:
          POSTGRES_DB: brp_test
          POSTGRES_USER: brp
          POSTGRES_PASSWORD: brp
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U brp -d brp_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    env:
      BRP_DATABASE_URL: postgresql+psycopg://brp:brp@localhost:55432/brp_test
      BRP_ENVIRONMENT: test
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.3"
          enable-cache: true
      - run: uv sync --project platform --frozen
      - run: uv run --project platform ruff check platform scripts
      - run: uv run --project platform mypy platform/src
      - run: uv run --project platform alembic upgrade head
        working-directory: platform
      - run: uv run --project platform pytest platform/tests
      - run: uv run --project platform python scripts/export_openapi.py docs/openapi-v1.json
      - run: git diff --exit-code -- docs/openapi-v1.json
      - run: uv export --project platform --format requirements-txt --no-hashes --output-file platform/output/requirements-ci.txt
      - run: uvx pip-audit -r platform/output/requirements-ci.txt

  connector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.3"
          enable-cache: true
      - run: uv sync --project mcp-db-connector --frozen
      - run: uv run --project mcp-db-connector ruff check mcp-db-connector
      - run: uv run --project mcp-db-connector pytest mcp-db-connector/tests

  java-toolchain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: ./gradlew build --no-daemon
        working-directory: java-toolchain

  fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - run: ./gradlew test --no-daemon
        working-directory: fixtures/legacy-enrollment

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: ui
      - run: pnpm build
        working-directory: ui
      - run: pnpm exec vitest run
        working-directory: ui
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: ui
      - run: pnpm test:e2e
        working-directory: ui
      - run: pnpm audit --prod --audit-level high
        working-directory: ui

  container-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f platform/Dockerfile -t brp-api:ci .
      - run: docker build -f ui/Dockerfile -t brp-ui:ci .
      - run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.3 detect --source=/repo --no-banner
      - run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.59.1 image --exit-code 1 --severity HIGH,CRITICAL brp-api:ci
      - run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.59.1 image --exit-code 1 --severity HIGH,CRITICAL brp-ui:ci
      - run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock anchore/syft:v1.20.0 brp-api:ci -o cyclonedx-json=brp-api-sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: brp-sbom
          path: brp-api-sbom.json
