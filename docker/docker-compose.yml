name: brp

services:
  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_DB: brp
      POSTGRES_USER: brp
      POSTGRES_PASSWORD: brp
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brp -d brp"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - brp-postgres-data:/var/lib/postgresql/data

volumes:
  brp-postgres-data:
