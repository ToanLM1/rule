server {
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'" always;

  location = /healthz { access_log off; return 200 'ok'; add_header Content-Type text/plain; }
  location /api/ { proxy_pass http://api:8100; proxy_set_header Host $host; proxy_set_header X-Request-ID $request_id; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 65s; }
  location /health/ { proxy_pass http://api:8100; }
  location /metrics { proxy_pass http://api:8100; }
  location ~* \.(?:js|css|svg|png|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; try_files $uri =404; }
  location / { try_files $uri $uri/ /index.html; add_header Cache-Control "no-cache"; }
}
